<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1Z5E4QSTR2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1Z5E4QSTR2', { 'anonymize_ip': true });
  </script>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curriculum Vitae | Young-An Kim</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎓</text></svg>">
  
  <style>
    :root{ --bg:#f8fafc; --panel:#ffffff; --muted:#64748b; --text:#1e293b; --brand:#0284c7; --chip-border:#e2e8f0; --maxw:1080px; --radius:16px; }
    *{box-sizing:border-box}
    body{font-family:'Inter','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.6}
    a{text-decoration:none}
    
    header{position:sticky;top:0;backdrop-filter:saturate(1.2) blur(10px);background:rgba(248,250,252,.8);border-bottom:1px solid var(--chip-border);z-index:40}
    .nav{display:flex;align-items:center;gap:16px;justify-content:space-between;max-width:var(--maxw);margin:0 auto;padding:14px 28px}
    .nav a.brand{display:flex;gap:12px;align-items:center;font-weight:700;color:var(--text)}
    .nav .links{display:flex;gap:18px;flex-wrap:wrap}
    .nav .links a{padding:6px 10px;border-radius:10px;color:var(--muted);font-weight:500}
    .nav .links a:hover{background:#f1f5f9;color:var(--text)}
    .nav .links a.active { color: var(--brand); font-weight: 700; }

    .wrap{max-width:var(--maxw);margin:0 auto;padding:40px 28px}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;border-bottom:2px solid var(--chip-border);padding-bottom:12px}
    .head h2{margin:0;font-size:2rem}
    
    .btn-download {
      background: var(--brand);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-download:hover { background: #0369a1; }

    /* PDF 뷰어 프레임 */
    .pdf-container {
      width: 100%;
      height: 950px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--chip-border);
      background: #ffffff;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      .pdf-container { height: 600px; }
    }
    footer{margin:80px 0; color:var(--muted); text-align:center; font-size:0.9rem}
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="index.html"><span>🎓</span><span>Young-An Kim</span></a>
      <div class="links">
        <a href="index.html#about">About me</a>
        <a href="index.html#news">News</a>
        <a href="publications.html">Publication</a>
        <a href="cv.html" class="active">CV</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="wrap">
    <section>
      <div class="head">
        <h2>Curriculum Vitae</h2>
        <!-- 원본 구글 드라이브 다운로드/보기 버튼 -->
        <a href="https://drive.google.com/file/d/1MlPH0hVaw2-rJqYCKq94ROoOW_sG8sWX/view?usp=sharing" target="_blank" class="btn-download">📥 PDF 다운로드 / 새 창으로 보기</a>
      </div>
      
      <!-- 구글 드라이브 PDF 임베드 뷰어 -->
      <div class="pdf-container">
        <iframe src="https://drive.google.com/file/d/1MlPH0hVaw2-rJqYCKq94ROoOW_sG8sWX/preview" width="100%" height="100%" allow="autoplay"></iframe>
      </div>
    </section>

    <footer><p>© <span id="year-now"></span> Young-An Kim. All rights reserved.</p></footer>
  </main>

  <script>
    document.getElementById('year-now').textContent = new Date().getFullYear();
  </script>
</body>
</html>
